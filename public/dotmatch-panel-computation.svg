      .trace-red { stroke: #dc2626; stroke-width: 4; fill: none; stroke-linecap: round; opacity: 0.82; }
      .panel { fill: #ffffff; stroke: #cbdad6; stroke-width: 2; }
      .chip { fill: #f8fbfa; stroke: #d8e5e1; stroke-width: 1.5; }
      .base-a { fill: #c7f0dc; }
      .base-c { fill: #b8ddff; }
      .base-g { fill: #fde68a; }
      .base-t { fill: #d8c7ff; }
