<svg xmlns="http://www.w3.org/2000/svg" width="1672" height="941" viewBox="0 0 1672 941" role="img" aria-labelledby="title desc">
  <title id="title">Computational barcode panel analysis</title>
  <desc id="desc">Abstract visualization of DNA barcode sequences, edit-distance checks, collision detection, and read assignment paths.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#fbfffd"/>
      <stop offset="0.58" stop-color="#eef8f5"/>
      <stop offset="1" stop-color="#f9fbff"/>
    </linearGradient>
