title: "DotMatch QC"
subtitle: "Known-target short-DNA assignment summary"

custom_data:
  dotmatch_sample_qc:
    file_format: "tsv"
    section_name: "DotMatch Sample QC"
    description: "Known-target assignment QC emitted by DotMatch sample_qc.tsv outputs."
    plot_type: "table"
    pconfig:
      id: "dotmatch_sample_qc_table"
      title: "DotMatch Sample QC"
      col1_header: "Sample"
    headers:
      fastq:
        title: "FASTQ"
        description: "Input FASTQ path."
      total_reads:
        title: "Total Reads"
        description: "FASTQ records processed."
        format: "{:,.0f}"
      valid_extracted_reads:
        title: "Valid Extracted"
        description: "Reads with a valid extracted target window."
        format: "{:,.0f}"
      assigned_reads:
        title: "Assigned"
        description: "Reads uniquely assigned to a target."
        format: "{:,.0f}"
      exact_reads:
        title: "Exact"
        description: "Uniquely assigned exact target matches."
        format: "{:,.0f}"
      k1_rescued_reads:
        title: "K1 Rescued"
        description: "Uniquely assigned non-exact one-edit reads."
        format: "{:,.0f}"
      ambiguous_reads:
        title: "Ambiguous"
        description: "Reads with non-unique assignment under the configured policy."
        format: "{:,.0f}"
      no_match_reads:
        title: "No Match"
        description: "Valid extracted reads with no target within the configured radius."
        format: "{:,.0f}"
      assignment_rate:
        title: "Assignment Rate"
        description: "Assigned reads divided by valid extracted reads."
        min: 0
        max: 1
        scale: "RdYlGn"
      exact_rate:
        title: "Exact Rate"
        description: "Exact assigned reads divided by valid extracted reads."
        min: 0
        max: 1
      rescue_rate:
        title: "Rescue Rate"
        description: "Non-exact uniquely assigned reads divided by valid extracted reads."
        min: 0
        max: 1
      ambiguous_rate:
        title: "Ambiguous Rate"
        description: "Ambiguous reads divided by valid extracted reads."
        min: 0
        max: 1
        scale: "YlOrRd"
      no_match_rate:
        title: "No-Match Rate"
        description: "No-match reads divided by valid extracted reads."
        min: 0
        max: 1
        scale: "YlOrRd"
      targets_observed:
        title: "Targets Observed"
        description: "Targets with at least one uniquely assigned read."
        format: "{:,.0f}"
      zero_count_targets:
        title: "Zero Targets"
        description: "Targets with zero uniquely assigned reads."
        format: "{:,.0f}"
      gini_index:
        title: "Gini"
        description: "Target-count inequality across the library."
        min: 0
        max: 1
      top_1pct_read_fraction:
        title: "Top 1% Fraction"
        description: "Fraction of assigned reads in the top 1% of targets."
        min: 0
        max: 1
      candidates_verified:
        title: "Candidates Verified"
        description: "Indexed assignment candidates verified exactly."
        format: "{:,.0f}"
  dotmatch_assay_manifest:
    file_format: "tsv"
    section_name: "DotMatch Assay Manifest"
    description: "Workflow-facing summary emitted as assay_manifest.summary.tsv by dotmatch assay run."
    plot_type: "table"
    pconfig:
      id: "dotmatch_assay_manifest_table"
      title: "DotMatch Assay Manifest"
      col1_header: "Mode"
    headers:
      assay_type:
        title: "Assay"
        description: "Assay type declared in the AssaySpec."
      status:
        title: "Spec Status"
        description: "AssaySpec status used for the run."
      autopsy_triggered:
        title: "Autopsy"
        description: "Whether automatic autopsy was triggered by QC thresholds."
      warning_count:
        title: "Warnings"
        description: "Number of audit or run warnings recorded in the manifest."
        format: "{:,.0f}"
      production_warning_count:
        title: "Production Warnings"
        description: "Number of production QC warnings recorded in the manifest."
        format: "{:,.0f}"
      sample_count:
        title: "Samples"
        description: "Number of samples represented by the AssaySpec run."
        format: "{:,.0f}"
      primary_report:
        title: "Primary Report"
        description: "Path to assay_report.html."
      manifest:
        title: "Manifest"
        description: "Path to assay_manifest.json."
  dotmatch_crispr_qc:
    file_format: "tsv"
    section_name: "DotMatch CRISPR QC"
    description: "CRISPR guide-count QC emitted by DotMatch crispr_qc.summary.tsv outputs."
    plot_type: "table"
    pconfig:
      id: "dotmatch_crispr_qc_table"
      title: "DotMatch CRISPR QC"
      col1_header: "Sample"
    headers:
      qc_status:
        title: "QC Status"
        description: "Pass or review status from the CRISPR QC thresholds."
      total_count:
        title: "Total Count"
        description: "Total uniquely assigned guide counts for the sample."
        format: "{:,.0f}"
      coverage_fraction:
        title: "Coverage"
        description: "Fraction of library guides observed with at least one count."
        min: 0
        max: 1
        scale: "RdYlGn"
      zero_count_fraction:
        title: "Zero Fraction"
        description: "Fraction of library guides with zero counts."
        min: 0
        max: 1
        scale: "YlOrRd"
      gini_index:
        title: "Gini"
        description: "Guide-count inequality across the library."
        min: 0
        max: 1
      top_1pct_fraction:
        title: "Top 1% Fraction"
        description: "Fraction of assigned guide counts in the top 1% of guides."
        min: 0
        max: 1
      assignment_rate:
        title: "Assignment Rate"
        description: "Assigned reads divided by valid extracted reads."
        min: 0
        max: 1
      ambiguous_rate:
        title: "Ambiguous Rate"
        description: "Ambiguous reads divided by valid extracted reads."
        min: 0
        max: 1
      no_match_rate:
        title: "No-Match Rate"
        description: "No-match reads divided by valid extracted reads."
        min: 0
        max: 1
      invalid_rate:
        title: "Invalid Rate"
        description: "Invalid extracted reads divided by total reads."
        min: 0
        max: 1

sp:
  dotmatch_sample_qc:
    fn: "*sample_qc.tsv"
  dotmatch_assay_manifest:
    fn: "*assay_manifest.summary.tsv"
  dotmatch_crispr_qc:
    fn: "*crispr_qc.summary.tsv"

custom_content:
  order:
    - dotmatch_assay_manifest
    - dotmatch_crispr_qc
    - dotmatch_sample_qc
