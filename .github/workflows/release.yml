name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write
  id-token: write
  packages: write

jobs:
  preflight:
    name: Release preflight gates
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Install release tooling
        run: python -m pip install build pytest
      - name: Run release gates
        run: |
          make test
          make cli-test
          make python-test
          make repository-ready
          make release-ready
          make python-package-test

  wheel:
    name: Build ${{ matrix.label }} wheel
    needs: [preflight]
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            label: Linux raw
            artifact_name: dotmatch-wheel-linux-raw
          - os: macos-latest
            label: macOS
            artifact_name: dotmatch-wheel-macos
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Install build tooling
        run: python -m pip install build
      - name: Build and verify wheel
        run: python scripts/check_python_wheel.py --out-dir dist
      - uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact_name }}
          path: dist/*.whl

  linux-repaired-wheels:
    name: Build manylinux/musllinux wheels
    runs-on: ubuntu-latest
    needs: [preflight]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Build and test repaired Linux wheels
        uses: pypa/cibuildwheel@v3.4.1
        env:
          CIBW_PLATFORM: linux
        with:
          output-dir: dist-linux
      - uses: actions/upload-artifact@v7
        with:
          name: dotmatch-linux-repaired-wheels
          path: dist-linux/*.whl

  sdist:
    name: Build source distribution
    needs: [preflight]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Install build tooling
        run: python -m pip install build
      - name: Build and verify source distribution
        run: python scripts/check_python_wheel.py --sdist-only --out-dir dist
      - uses: actions/upload-artifact@v7
        with:
          name: dotmatch-sdist
          path: dist/*.tar.gz

  container:
    name: Build container image
    needs: [preflight]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-buildx-action@v4
      - name: Build local smoke-test image
        run: docker build -t dotmatch:ci .
      - name: Smoke test container
        run: |
          docker run --rm dotmatch:ci --version | grep '^dotmatch 0.1.1$'
          docker run --rm dotmatch:ci dist ACGT AGGT | grep '^1$'
          docker run --rm dotmatch:ci leq 1 ACGT AGGT | grep '^true$'
          docker image inspect dotmatch:ci --format '{{ index .Config.Labels "org.opencontainers.image.version" }}' | grep '^0.1.1$'
      - uses: docker/metadata-action@v6
        id: meta
        with:
          images: ghcr.io/dnncha/dotmatch
          tags: |
            type=ref,event=tag
            type=sha
      - uses: docker/build-push-action@v7
        with:
          context: .
          push: ${{ startsWith(github.ref, 'refs/tags/') }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  pypi-sdist:
    name: Publish PyPI sdist, macOS wheel, and repaired Linux wheels
    if: startsWith(github.ref, 'refs/tags/')
    needs: [preflight, sdist, wheel, linux-repaired-wheels]
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/dotmatch/
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: dotmatch-sdist
          path: dist-pypi
      - uses: actions/download-artifact@v8
        with:
          name: dotmatch-wheel-macos
          path: dist-pypi
      - uses: actions/download-artifact@v8
        with:
          name: dotmatch-linux-repaired-wheels
          path: dist-pypi
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist-pypi

  github-release:
    name: Create GitHub release artifacts
    if: startsWith(github.ref, 'refs/tags/')
    needs: [preflight, wheel, sdist, linux-repaired-wheels]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v8
        with:
          path: dist
          merge-multiple: true
      - name: Generate checksums
        run: |
          cd dist
          sha256sum * > SHA256SUMS.txt
      - uses: softprops/action-gh-release@v3
        with:
          draft: true
          generate_release_notes: true
          files: |
            dist/*.whl
            dist/*.tar.gz
            dist/SHA256SUMS.txt
