version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 3
    groups:
      site-dependencies:
        patterns:
          - "next"
          - "react"
          - "react-dom"
          - "@types/*"
          - "typescript"
  - package-ecosystem: "npm"
    directory: "/apps/workbench"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 3
    groups:
      workbench-dependencies:
        patterns:
          - "@tauri-apps/*"
          - "@vitejs/*"
          - "vite"
          - "react"
          - "react-dom"
          - "typescript"
  - package-ecosystem: "cargo"
    directory: "/apps/workbench/src-tauri"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 3
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 3
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 3
    groups:
      actions:
        patterns:
          - "*"
